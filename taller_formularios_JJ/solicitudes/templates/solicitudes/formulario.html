{% extends 'base.html' %}

{% block title %}Registrar Solicitud{% endblock %}

{% block content %}
<div class="glass-form-container">
    <h2 class="form-title">📝 Registrar Solicitud</h2>
    <!-- IMPORTANTE: enctype requerido para el envío de archivos -->
    <form method="post" enctype="multipart/form-data" class="premium-form">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn-submit">Enviar Solicitud</button>
    </form>
</div>
{% endblock %}
